<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智能小英 - 医疗核保助手</title>
<style>
@font-face{font-family:"AlibabaPuHuiTi";src:url("fonts/AlibabaPuHuiTi-3-55-Regular.ttf") format("truetype");font-weight:400;font-style:normal}
@font-face{font-family:"AlibabaPuHuiTi";src:url("fonts/AlibabaPuHuiTi-3-65-Medium.ttf") format("truetype");font-weight:500;font-style:normal}
@font-face{font-family:"AlibabaPuHuiTi";src:url("fonts/AlibabaPuHuiTi-3-75-SemiBold.ttf") format("truetype");font-weight:600;font-style:normal}
@font-face{font-family:"AlibabaPuHuiTi";src:url("fonts/AlibabaPuHuiTi-3-85-Bold.ttf") format("truetype");font-weight:700;font-style:normal}
:root{
  --green:#5B8FF9;--green-dark:#3D6DD8;--green-light:#E8F0FE;--green-grad:linear-gradient(135deg,#5B8FF9,#7EABFF);
  --bg:#F5F6FA;--white:#FFFFFF;--text-primary:#1A1A1A;--text-secondary:#666666;--text-tertiary:#999999;
  --border:#EEEEEE;--shadow:0 2px 8px rgba(0,0,0,.04);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"AlibabaPuHuiTi","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(160deg,#e8f0fe 0%,#f0f3f8 50%,#edf1f9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
::-webkit-scrollbar{width:0;height:0}
.phone{width:390px;height:780px;background:var(--bg);border-radius:44px;box-shadow:0 20px 60px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);overflow:hidden;display:flex;flex-direction:column;position:relative}
.status-bar{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:8px 28px 4px;font-size:11px;font-weight:500;flex-shrink:0}
.status-bar .notch{width:90px;height:24px;background:#000;border-radius:0 0 16px 16px}

/* Page system */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.page{display:none;flex-direction:column;height:100%;overflow:hidden}
.page.active{display:flex}

/* Header */
.gh{background:var(--green);color:#fff;padding:0 16px 12px;flex-shrink:0}
.gh h2{font-size:17px;font-weight:600;letter-spacing:.3px}
.gh .sub{font-size:11px;opacity:.8;margin-top:2px}

/* Tab Bar */
.tab-bar{flex-shrink:0;background:var(--white);display:flex;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.tab-bar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 0 4px;background:none;border:none;cursor:pointer;color:var(--text-tertiary);transition:all .25s;font-size:10px;position:relative;gap:2px}
.tab-bar button.active{color:var(--green)}
.tab-bar button.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--green);border-radius:0 0 2px 2px}
.tab-bar button svg{width:22px;height:22px;stroke-width:1.8}
.tab-bar button.active svg{stroke-width:2.2}
.home-ind{flex-shrink:0;background:var(--white);display:flex;align-items:center;justify-content:center;padding:5px 0}
.home-ind div{width:120px;height:4px;background:#ccc;border-radius:2px}

/* Card */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

/* Avatar */
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:600;flex-shrink:0}
.av.lg{width:56px;height:56px;font-size:20px}
.av-xl{width:64px;height:64px;font-size:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.av-1{background:linear-gradient(135deg,#8FAADC,#B4CBEB)}
.av-2{background:linear-gradient(135deg,#7B9AD8,#9DB6E3)}
.av-3{background:linear-gradient(135deg,#9F97C9,#B5AFDA)}
.av-4{background:linear-gradient(135deg,#D4A0B0,#DEBCBC)}
.av-5{background:linear-gradient(135deg,#82BDD8,#A5D4E4)}
.av-6{background:linear-gradient(135deg,#D4A98A,#E2C5A9)}
.av-colors{--c1:linear-gradient(135deg,#8FAADC,#B4CBEB);--c2:linear-gradient(135deg,#7B9AD8,#9DB6E3);--c3:linear-gradient(135deg,#9F97C9,#B5AFDA);--c4:linear-gradient(135deg,#D4A0B0,#DEBCBC);--c5:linear-gradient(135deg,#82BDD8,#A5D4E4);--c6:linear-gradient(135deg,#D4A98A,#E2C5A9)}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-ok{background:#E8F0FE;color:#5B8FF9}
.badge-no{background:#FFF0F0;color:#FF4D4F}
.badge-wait{background:#FFF7E6;color:#FA8C16}
.badge-ex{background:#E6F7FF;color:#1890FF}

/* ==================== Home Page ==================== */
.home-scroll{flex:1;overflow-y:auto}
.home-hero{position:relative;background:var(--green-grad);padding:0 0 6px;overflow:hidden}
.home-hero::after{content:"";position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.home-hero::before{content:"";position:absolute;bottom:-20px;left:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.home-hdr{padding:14px 16px 16px;position:relative;z-index:1}
.home-hdr .brand{font-size:22px;font-weight:700;color:#fff;letter-spacing:1px}
.edit-btn{margin-left:auto;display:flex;align-items:center;gap:4px;padding:6px 14px;background:var(--green);color:#fff;border:none;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(91,143,249,.25)}.edit-btn:active{transform:scale(.96)}
.edit-btn.save{background:#52C41A}.edit-btn.cancel{background:#999;margin-right:8px}
.info-cell input.edit-inp,.info-cell select.edit-inp{width:100%;padding:6px 10px;border:1.5px solid var(--green);border-radius:8px;font-size:13px;color:var(--text-primary);background:var(--green-light);outline:none;transition:border-color .2s}
.info-cell input.edit-inp:focus,.info-cell select.edit-inp:focus{border-color:var(--green-dark)}
.nickname-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:var(--green-light);color:var(--green);border-radius:10px;font-size:11px;font-weight:500;margin-left:6px}
.hero-card{margin:0 16px 0 16px;border-radius:16px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);padding:10px 0 10px 20px;position:relative;z-index:1;display:flex;align-items:flex-start;gap:16px;flex-direction:row-reverse;height:165px;box-sizing:border-box}
.hero-card .hero-illust{width:140px;height:160px;border-radius:0;object-fit:contain;object-position:center bottom;flex-shrink:0;background:none;box-shadow:none;margin-right:-10px;mix-blend-mode:multiply}
.hero-card .hero-text{flex:1;text-align:left;min-width:0;margin-top:20px}
.hero-card h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;margin-top:-20px;line-height:1.4;white-space:nowrap}
.hero-card p{font-size:12px;color:rgba(255,255,255,.85);margin-bottom:14px;line-height:1.5}
.hero-btn{display:inline-flex;align-items:center;gap:0;padding:9px 20px;background:#fff;color:var(--green);border:none;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:all .2s;white-space:nowrap}
.hero-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.hero-btn:active{transform:scale(.97)}

.section{padding:16px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-hdr .st{font-size:15px;font-weight:600;color:var(--text-primary)}
.section-hdr .more{font-size:12px;color:var(--green);cursor:pointer;display:flex;align-items:center;gap:2px;border:none;background:none}
.section-hdr .more svg{width:14px;height:14px}

/* Product promo banner */
.prod-banner-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.prod-card-title{padding:16px 16px 0;font-size:16px;font-weight:700;color:var(--text-primary)}
.prod-svc-title{padding:14px 16px 10px;font-size:14px;font-weight:700;color:var(--text-primary)}
.prod-svc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;padding:0 16px 12px}
.prod-svc-item{display:flex;align-items:center;gap:5px;padding:4px 0}
.prod-svc-item .svc-chk{width:14px;height:14px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prod-svc-item .svc-chk svg{width:8px;height:8px;color:#fff}
.prod-svc-item span{font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-center{display:flex;gap:12px;padding:0 16px 14px;align-items:stretch}
.prod-center .prod-img{width:102px;height:102px;border-radius:10px;object-fit:cover;flex-shrink:0}
.prod-center .prod-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.prod-center .prod-name{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:6px}
.prod-center .prod-price{display:flex;align-items:baseline;gap:3px;margin-bottom:4px}
.prod-center .prod-price .p-num{font-size:22px;font-weight:800;color:#FA8C16}
.prod-center .prod-price .p-unit{font-size:11px;color:var(--text-tertiary)}
.prod-center .prod-price .p-sub{font-size:10px;color:var(--text-tertiary);margin-left:2px}
.prod-center .prod-start{font-size:12px;color:var(--text-secondary)}
.prod-center .prod-start strong{color:var(--text-primary);font-weight:600}
.prod-center .prod-note{font-size:10px;color:var(--text-tertiary);margin-top:4px;line-height:1.4}
.prod-cta-full{padding:0 16px 14px}
.prod-cta-full button{width:100%;padding:12px 0;border-radius:24px;font-size:14px;font-weight:600;border:none;background:var(--green-grad);color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(91,143,249,.25);transition:all .2s}
.prod-cta-full button:active{transform:scale(.97)}

.video-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.video-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .2s}
.video-card:active{transform:scale(.97)}
.video-thumb{position:relative;aspect-ratio:2/3;background:#e8e8ec;overflow:hidden}
.video-thumb img{width:100%;height:100%;object-fit:cover}
.video-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.video-play .play-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.video-play .play-btn svg{width:16px;height:16px;color:#fff;margin-left:2px}
.video-badge{position:absolute;top:6px;right:6px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px;z-index:2;background:linear-gradient(135deg,#F5D06E,#D4A23A);color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.2);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.video-badge.free{background:linear-gradient(135deg,#A8D8A8,#5CB85C);text-shadow:0 1px 1px rgba(0,0,0,.15)}
.video-info{padding:8px 10px}
.video-info .vt{font-size:12px;font-weight:500;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.video-info .vd{font-size:10px;color:var(--text-tertiary);margin-top:3px;display:flex;align-items:center;gap:4px}
.load-more-btn{display:flex;align-items:center;justify-content:center;gap:0;width:auto;padding:8px 0;margin:12px auto 0;background:none;border:none;font-size:12px;color:var(--green);cursor:pointer;transition:all .2s;text-decoration:underline}
.load-more-btn:hover{color:var(--green-dark)}

/* ==================== Chat Page ==================== */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--green);color:#fff}
.chat-hdr .bot-av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center}
.chat-hdr .info{flex:1}
.chat-hdr .info .t{font-size:16px;font-weight:600}
.chat-hdr .info .s{font-size:11px;opacity:.8;margin-top:1px}
.chat-hdr .online{display:flex;align-items:center;gap:5px;font-size:11px;opacity:.8}
.chat-hdr .online .dot{width:7px;height:7px;border-radius:50%;background:#93C5FD;animation:pulse 2s infinite}

.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:8px;max-width:85%}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg .m-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0}
.msg.assistant .m-av{background:var(--green)}
.msg.user .m-av{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.msg .bbl{padding:10px 14px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.assistant .bbl{background:var(--white);color:var(--text-primary);border-radius:2px 12px 12px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.msg.user .bbl{background:var(--green);color:#fff;border-radius:12px 2px 12px 12px}
.msg .ts{font-size:10px;color:var(--text-tertiary);margin-top:4px;text-align:right}
.ai-toolbar{margin-top:10px;padding-top:10px;border-top:1px solid #eee;display:flex;flex-direction:column;align-items:flex-start;gap:6px}
.ai-toolbar .ai-disclaimer{font-size:10px;color:#bbb;letter-spacing:.3px;background:none;border:none;padding:0;margin:0;display:block}
.ai-actions{display:flex;gap:6px}
.ai-actions button{width:32px;height:32px;border-radius:8px;border:none;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.ai-actions button:active{transform:scale(.9)}
.ai-actions button svg{width:16px;height:16px;color:#666;stroke:#666}
.ai-actions button.active{background:#E8F5E9}
.ai-actions button.active svg{color:var(--green);stroke:var(--green)}
.ai-actions button.dislike-active{background:#FFF0F0}
.ai-actions button.dislike-active svg{color:#FF4D4F;stroke:#FF4D4F}
.ai-prompts{margin-top:4px;display:flex;flex-direction:column;gap:5px;width:fit-content;max-width:85%}
.ai-prompts .ai-prompt{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:all .15s;font-size:12px;color:#333;white-space:nowrap}
.ai-prompts .ai-prompt:active{transform:scale(.97);background:#f9f9f9}
.ai-prompts .ai-prompt .arr{color:#bbb;font-size:14px;margin-left:8px}

.typing{display:flex;gap:8px;max-width:85%}
.typing .m-av{width:32px;height:32px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center}
.typing .bbl{background:var(--white);border-radius:2px 12px 12px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:12px 16px;display:flex;gap:5px}
.typing .bbl span{width:6px;height:6px;background:#ccc;border-radius:50%;animation:bounce .6s infinite}
.typing .bbl span:nth-child(2){animation-delay:.15s}
.typing .bbl span:nth-child(3){animation-delay:.3s}

.quick-row{padding:4px 16px 8px;position:relative}
.qk-trigger{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.qk-trigger:active{border-color:var(--green);background:var(--green-light)}
.qk-trigger.open{border-color:var(--green);border-radius:12px 12px 0 0;box-shadow:none}
.qk-trigger .qk-label{font-size:12px;color:var(--text-tertiary);flex-shrink:0}
.qk-trigger .qk-val{flex:1;font-size:13px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qk-trigger .qk-arrow{width:16px;height:16px;color:var(--text-tertiary);transition:transform .25s;flex-shrink:0}
.qk-trigger.open .qk-arrow{transform:rotate(180deg)}
.qk-panel{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--white);border:1px solid var(--green);border-top:none;border-radius:0 0 12px 12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.qk-panel.open{max-height:220px}
.quick-card{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;transition:all .15s;border-bottom:1px solid var(--border)}
.quick-card:last-child{border-bottom:none;border-radius:0 0 12px 12px}
.quick-card:active{background:var(--green-light)}
.quick-card:hover{background:var(--green-light)}
.quick-card .qc-info{flex:1;min-width:0}
.quick-card .qc-title{font-size:13px;font-weight:600;color:var(--text-primary)}
.quick-card .qc-sub{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.quick-card .qc-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.quick-card .qc-check svg{width:10px;height:10px;color:transparent}
.quick-card.selected .qc-check{background:var(--green);border-color:var(--green)}
.quick-card.selected .qc-check svg{color:#fff}
.quick-btn{display:none}

.quick-ask{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--white);border-top:1px solid var(--border)}
.quick-ask::-webkit-scrollbar{display:none}
.qa-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;white-space:nowrap;font-size:12px;color:var(--text-primary);transition:all .15s}
.qa-btn:active{background:var(--green-light);border-color:var(--green)}
.qa-btn svg{flex-shrink:0;color:var(--green)}
.chat-bar{padding:8px 12px;background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.chat-bar input{flex:1;padding:9px 16px;background:var(--bg);border:1px solid transparent;border-radius:20px;font-size:13px;outline:none;transition:all .2s;color:var(--text-primary)}
.chat-bar input:focus{border-color:var(--green);background:var(--white)}
.chat-bar input::placeholder{color:var(--text-tertiary)}
.upload-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;position:relative}
.upload-btn:hover{background:var(--green-light);color:var(--green)}
.upload-btn:active{transform:scale(.92)}
.upload-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-bbl{background:var(--white);border-radius:2px 12px 12px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:0;overflow:hidden;max-width:220px}
.file-bbl .file-top{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg)}
.file-bbl .file-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-bbl .file-ico.img-type{background:#E6F7FF;color:#1890FF}
.file-bbl .file-ico.doc-type{background:#FFF7E6;color:#FA8C16}
.file-bbl .file-ico.pdf-type{background:#FFF0F0;color:#FF4D4F}
.file-bbl .file-name{font-size:12px;color:var(--text-primary);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.file-bbl .file-size{font-size:10px;color:var(--text-tertiary);padding:0 12px 8px}
.img-bbl{position:relative;border-radius:12px;overflow:hidden;max-width:200px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.img-bbl img{width:100%;display:block;border-radius:12px;max-height:150px;object-fit:cover;object-position:top}
.privacy-badge{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;background:#6B5CE7;color:#fff;font-size:11px;font-weight:500;cursor:pointer;z-index:2;box-shadow:0 2px 6px rgba(107,92,231,.35);transition:all .2s}
.privacy-badge:active{transform:scale(.95);background:#5A4BD6}
.privacy-badge svg{width:14px;height:14px;flex-shrink:0}
.send-btn{width:36px;height:36px;border-radius:50%;background:var(--green);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:disabled{background:#ddd;cursor:default}
.send-btn:active:not(:disabled){transform:scale(.92)}

/* ==================== List Pages ==================== */
.search-wrap{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.search-box{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg);border-radius:20px;border:1px solid transparent;transition:all .2s}
.search-box:focus-within{border-color:var(--green);background:var(--white)}
.search-box input{flex:1;background:transparent;border:none;font-size:13px;outline:none;color:var(--text-primary)}
.search-box input::placeholder{color:var(--text-tertiary)}
.search-box svg{width:16px;height:16px;color:var(--text-tertiary);flex-shrink:0}
.clr-btn{background:none;border:none;color:var(--text-tertiary);cursor:pointer;padding:2px;display:flex}

.list-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--white);border-bottom:1px solid var(--border)}
.stats-row .st{text-align:center;padding:12px 0}
.stats-row .st .n{font-size:20px;font-weight:700}
.stats-row .st .l{font-size:10px;color:var(--text-tertiary);margin-top:2px}

.filter-row{display:flex;gap:8px;padding:10px 16px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto}
.fbtn{padding:5px 14px;border-radius:16px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s;flex-shrink:0}
.fbtn.on{background:var(--green);color:#fff}
.fbtn:not(.on){background:var(--bg);color:var(--text-secondary)}
.fbtn:not(.on):hover{background:#e8e8ec}

/* Archive card */
.a-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:all .2s;display:flex;gap:12px;align-items:flex-start}
.a-card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.a-card .c-info{flex:1;min-width:0}
.a-card .c-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.a-card .c-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.a-card .c-meta{font-size:12px;color:var(--text-tertiary);margin-bottom:6px}
.a-card .c-tag{display:flex;align-items:center;gap:4px;font-size:12px;color:#FA8C16;margin-bottom:4px}
.a-card .c-tag svg{width:12px;height:12px;flex-shrink:0}
.a-card .c-time{display:flex;align-items:center;gap:4px;font-size:11px;color:#ccc}
.a-card .c-time svg{width:11px;height:11px}
.a-card .c-detail{font-size:12px;color:var(--text-secondary);margin-top:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5}
.chev-r{color:#d9d9d9;flex-shrink:0}
.chev-r svg{width:16px;height:16px}

/* ==================== Detail Page ==================== */
.dtl-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--green);color:#fff;flex-shrink:0}
.dtl-hdr .bk{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dtl-hdr .bk:hover{background:rgba(255,255,255,.3)}
.dtl-hdr .bk svg{width:18px;height:18px}
.dtl-hdr h2{font-size:16px;font-weight:600}

.user-banner{display:flex;align-items:center;gap:14px;padding:16px;background:var(--white);margin-bottom:8px}
.user-banner .uname{font-size:18px;font-weight:700;color:var(--text-primary)}
.user-banner .umeta{font-size:13px;color:var(--text-secondary);margin-top:3px}
.user-banner .utime{font-size:12px;color:var(--text-tertiary);margin-top:3px}

.dtl-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 4px;margin-bottom:0}
.dtl-tabs button{flex:1;padding:11px 0;font-size:13px;font-weight:500;text-align:center;border:none;border-bottom:2px solid transparent;cursor:pointer;background:none;color:var(--text-tertiary);transition:all .2s}
.dtl-tabs button.on{color:var(--green);border-bottom-color:var(--green)}

.dtl-body{flex:1;overflow-y:auto;padding:12px 16px}

.d-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.d-card h4{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.d-card h4 svg{width:16px;height:16px;color:var(--green)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-cell{background:var(--bg);border-radius:8px;padding:10px 12px}
.info-cell .il{font-size:11px;color:var(--text-tertiary)}
.info-cell .iv{font-size:13px;color:var(--text-primary);font-weight:500;margin-top:3px}

/* Health Status Card */
.hs-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 16px;margin-bottom:12px;position:relative;overflow:hidden;border:1px solid var(--border)}
.hs-card::after{content:"";position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:var(--green-light)}
.hs-card::before{content:"";position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(91,143,249,.03)}
.hs-top{display:flex;align-items:center;gap:20px;position:relative;z-index:1}
.hs-gauge{width:110px;height:60px;position:relative;flex-shrink:0}
.hs-gauge svg{width:110px;height:60px}
.hs-gauge .gauge-bg{fill:none;stroke:#E8E8EC;stroke-width:10;stroke-linecap:round}
.hs-gauge .gauge-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.hs-score-wrap{text-align:center;position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
.hs-score-num{font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--text-primary)}
.hs-score-unit{font-size:12px;color:var(--text-tertiary);margin-top:2px}
.hs-info{flex:1;min-width:0;position:relative;z-index:1}
.hs-level{display:inline-block;padding:3px 12px;border-radius:12px;font-size:11px;font-weight:600;margin-bottom:8px}
.hs-advice{font-size:12px;line-height:1.7;color:var(--text-secondary)}
.hs-levels{display:flex;gap:6px;margin-top:16px;position:relative;z-index:1}
.hs-levels .lv{flex:1;text-align:center;padding:6px 0;border-radius:8px;font-size:10px;font-weight:500;opacity:.5;transition:all .2s}
.hs-levels .lv.active{opacity:1;transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.1)}

.ai-notice{background:var(--green-light);border:1px solid #C5D9F7;border-radius:8px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.ai-notice svg{width:16px;height:16px;color:var(--green);flex-shrink:0;margin-top:1px}
.ai-notice p{font-size:12px;color:var(--green-dark);line-height:1.5}
.cond-text{font-size:13px;color:var(--text-secondary);line-height:1.8;white-space:pre-wrap}

.ai-bottom-bar{flex-shrink:0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));background:var(--white);border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.ai-interpret-btn{width:100%;padding:14px 18px;background:var(--green-grad);color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(91,143,249,.3);transition:all .2s;position:relative;overflow:hidden}
.ai-interpret-btn::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transition:none}
.ai-interpret-btn:hover::after{left:100%;transition:left .6s ease}
.ai-interpret-btn:active{transform:scale(.98);box-shadow:0 2px 10px rgba(91,143,249,.25)}
.ai-btn-ico{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-btn-ico svg{width:20px;height:20px;color:#fff}
.ai-btn-txt{flex:1;text-align:left}
.ai-btn-txt .t1{font-size:15px;font-weight:600;letter-spacing:.3px}
.ai-btn-txt .t2{font-size:11px;opacity:.8;margin-top:2px;font-weight:400}
.ai-btn-arrow{width:20px;height:20px;flex-shrink:0;opacity:.7}

/* AI Interpret Page */
.ai-page{display:flex;flex-direction:column;height:100%;background:var(--bg)}
.ai-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--green);color:#fff;flex-shrink:0}
.ai-hdr .bk{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ai-hdr .bk:hover{background:rgba(255,255,255,.3)}
.ai-hdr .bk svg{width:18px;height:18px}
.ai-hdr h2{font-size:16px;font-weight:600}
.ai-body{flex:1;overflow-y:auto;padding:16px}

.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.ai-loading .pulse-ring{width:80px;height:80px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:24px}
.ai-loading .pulse-ring::before{content:"";position:absolute;inset:0;border-radius:50%;border:3px solid var(--green);border-top-color:transparent;animation:aiSpin 1.2s linear infinite}
.ai-loading .pulse-ring svg{width:36px;height:36px;color:var(--green)}
.ai-loading .ld-title{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:8px}
.ai-loading .ld-step{font-size:13px;color:var(--text-secondary);margin-bottom:16px;min-height:20px}
.ai-progress{width:200px;height:4px;border-radius:2px;background:#E8E8EC;overflow:hidden}
.ai-progress .bar{height:100%;border-radius:2px;background:var(--green-grad);transition:width .3s ease}
@keyframes aiSpin{to{transform:rotate(360deg)}}

.ai-result-hdr{text-align:center;padding:20px 16px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px}
.ai-result-hdr .rh-ico{width:56px;height:56px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.ai-result-hdr .rh-ico svg{width:28px;height:28px}
.ai-result-hdr .rh-name{font-size:18px;font-weight:700;color:var(--text-primary)}
.ai-result-hdr .rh-meta{font-size:12px;color:var(--text-tertiary);margin-top:4px}
.ai-risk-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-top:12px}

.ai-section{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.ai-section .as-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-section .as-title svg{width:16px;height:16px}
.ai-section .as-body{font-size:13px;color:var(--text-secondary);line-height:1.8}
.ai-disease-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ai-disease-item:last-child{border-bottom:none}
.ai-disease-item .di-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.ai-disease-item .di-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.ai-disease-item .di-desc{font-size:12px;color:var(--text-tertiary);margin-top:2px;line-height:1.6}
.ai-rec-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;margin:4px 4px 4px 0}
.ai-disclaimer{background:#FFF7E6;border:1px solid #FFE0A0;border-radius:8px;padding:10px 12px;font-size:11px;color:#8C6D1F;line-height:1.6;margin-top:12px;display:flex;align-items:flex-start;gap:6px}
.ai-disclaimer svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;color:#D4A017}
.ai-again-btn{width:100%;padding:13px;background:var(--white);color:var(--green);border:1.5px solid var(--green);border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.ai-again-btn:active{background:var(--green-light);transform:scale(.97)}

.img-day{margin-bottom:12px}
.img-day .day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.img-day .day-hdr .dd{font-size:13px;font-weight:500;color:var(--text-primary)}
.img-day .day-hdr .cnt{font-size:10px;color:var(--text-tertiary);background:var(--bg);padding:2px 8px;border-radius:10px}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.img-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.img-item:hover{opacity:.85;transform:scale(1.02)}
.img-item img{width:100%;height:100%;object-fit:cover}
.img-upload-card{aspect-ratio:1;border-radius:8px;border:2px dashed #d0d5dd;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;gap:4px}
.img-upload-card:hover{border-color:var(--green);background:var(--green-light)}
.img-upload-card:active{transform:scale(.95)}
.img-upload-card svg{width:24px;height:24px;color:var(--text-tertiary)}
.img-upload-card:hover svg{color:var(--green)}
.img-upload-card span{font-size:11px;color:var(--text-tertiary)}
.img-upload-card:hover span{color:var(--green)}
.img-upload-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

.rec-card{margin-bottom:10px}
.rec-card .r-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rec-card .r-date{font-size:12px;color:var(--text-tertiary)}
.rec-card .r-prod{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:8px}
.rec-card .r-prod svg{width:14px;height:14px;color:var(--text-tertiary)}
.rec-card .r-txt{font-size:12px;color:var(--text-secondary);line-height:1.6;padding:10px 12px;background:var(--bg);border-radius:8px}

.re-btn{width:100%;padding:13px;background:var(--green-grad);color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(91,143,249,.25);transition:all .2s;margin-top:4px}
.re-btn:hover{box-shadow:0 6px 20px rgba(91,143,249,.35)}
.re-btn:active{transform:scale(.97)}
.re-btn svg{width:16px;height:16px}

/* ==================== Profile ==================== */
.prof-top{background:var(--green-grad);padding:28px 20px 24px;color:#fff;flex-shrink:0;position:relative;overflow:hidden}
.prof-edit-btn{position:absolute;top:16px;right:16px;z-index:2;display:flex;align-items:center;gap:4px;padding:6px 14px;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.3);border-radius:20px;color:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.prof-edit-btn:active{transform:scale(.95);background:rgba(255,255,255,.3)}
.prof-edit-btn svg{width:14px;height:14px}
.prof-edit-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--green);color:#fff;flex-shrink:0}
.prof-edit-hdr .bk{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.prof-edit-hdr .bk:hover{background:rgba(255,255,255,.3)}
.prof-edit-hdr .bk svg{width:18px;height:18px}
.prof-edit-hdr h2{font-size:16px;font-weight:600}
.prof-edit-body{flex:1;overflow-y:auto;padding:16px}
.prof-edit-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 16px}
.prof-edit-card .pe-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.prof-edit-card .pe-title svg{width:18px;height:18px;color:var(--green)}
.pe-field{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.pe-field:last-child{border-bottom:none}
.pe-field .pe-label{width:80px;font-size:13px;color:var(--text-secondary);flex-shrink:0}
.pe-field .pe-value{flex:1;font-size:14px;color:var(--text-primary);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0;transition:color .2s}
.pe-field .pe-value:hover{color:var(--green)}
.pe-field .pe-value .pe-edit-ico{width:14px;height:14px;color:var(--text-tertiary);opacity:0;transition:opacity .2s;flex-shrink:0}
.pe-field .pe-value:hover .pe-edit-ico{opacity:1}
.pe-field .pe-value.pe-empty{color:var(--text-tertiary);font-weight:400}
.pe-field .pe-inline{flex:1;padding:6px 10px;border:none;border-bottom:1.5px solid var(--green);font-size:14px;color:var(--text-primary);background:var(--green-light);outline:none;font-family:inherit;box-sizing:border-box;border-radius:4px 4px 0 0}
.pe-field .pe-gender{display:flex;gap:10px}
.pe-field .pe-gender label{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--text-primary);cursor:pointer;padding:6px 16px;border:1.5px solid var(--border);border-radius:8px;transition:all .2s}
.pe-field .pe-gender input{display:none}
.pe-field .pe-gender input:checked+label{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:500}
.pe-save-btn{width:100%;padding:13px;background:var(--green-grad);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;box-shadow:0 4px 16px rgba(91,143,249,.25);transition:all .2s}
.pe-save-btn:active{transform:scale(.97)}
.prof-top::after{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08)}
.prof-top::before{content:"";position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.prof-user{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.prof-user .p-av{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;border:2px solid rgba(255,255,255,.4)}
.prof-user .p-name{font-size:20px;font-weight:700}
.prof-user .p-phone{font-size:12px;opacity:.8;margin-top:3px;display:flex;align-items:center;gap:4px}
.prof-user .p-phone svg{width:12px;height:12px}
.prof-user .p-role{display:inline-block;margin-top:6px;font-size:11px;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:10px;backdrop-filter:blur(4px)}

.prof-stats{display:flex;gap:12px;margin-top:18px;position:relative;z-index:1}
.prof-stats .ps{flex:1;background:rgba(255,255,255,.18);border-radius:12px;padding:14px 12px;text-align:center;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.15)}
.prof-stats .ps .pn{font-size:28px;font-weight:700;letter-spacing:-.5px}
.prof-stats .ps .pl{font-size:11px;opacity:.85;margin-top:3px}

.prof-menu{flex:auto;min-height:0;overflow-y:auto;padding:12px 16px}
.m-item{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.m-item:active{transform:scale(.98)}
.m-item .m-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.m-item .m-ico svg{width:20px;height:20px}
.m-item .m-txt{flex:1}
.m-item .m-txt .mt{font-size:14px;font-weight:500;color:var(--text-primary)}
.m-item .m-txt .md{font-size:12px;color:var(--text-tertiary);margin-top:2px}

.ver-info{text-align:center;padding:20px;font-size:11px;color:#ccc}

/* ==================== Toolbox Section ==================== */
.toolbox-section{padding:0 16px 12px}
.toolbox-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.toolbox-title svg{width:18px;height:18px;color:var(--green)}
.toolbox-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tool-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s}
.tool-item:active{transform:scale(.92)}
.tool-item .ti-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tool-item .ti-ico svg{width:22px;height:22px}
.tool-item .ti-label{font-size:11px;color:var(--text-secondary);white-space:nowrap}

/* ==================== Wallet Entry Card (Profile) ==================== */
.wallet-entry{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:0;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.wallet-entry:active{transform:scale(.98)}

function bProfileEdit(){

  document.querySelectorAll('input[name="peGender"]').forEach(r=>r.addEventListener("change",()=>{ME.gender=r.value}));
  // Click-to-edit for all editable fields
  document.querySelectorAll(".pe-value").forEach(el=>{
    el.addEventListener("click",()=>{
      const key=el.dataset.key;
      if(!key||el.querySelector("input"))return;
      const current=ME[key]||"";
      const inp=document.createElement("input");
      inp.className="pe-inline";
      inp.type=key==="email"?"email":key==="contactPhone"||key==="phone"?"tel":"text";
      inp.value=current;
      inp.placeholder="请输入"+el.closest(".pe-field").querySelector(".pe-label").textContent;
      el.replaceWith(inp);
      inp.focus();
      inp.select();

        const v=inp.value.trim();
        ME[key]=v;
        if(key==="name"&&v)ME.av=v.charAt(0);
        page="profileEdit";render();
      };
      inp.addEventListener("blur",save);

function bRiskQuery(){
  document.getElementById("riskBack")?.addEventListener("click",()=>{page="profile";riskResult=null;render()});
  document.getElementById("riskQueryBtn")?.addEventListener("click",()=>{
    const name=document.getElementById("riskName").value.trim();
    const idCard=document.getElementById("riskIdCard").value.trim();
    if(!name){alert("请输入被保人姓名");return;}
    if(!idCard){alert("请输入被保人身份证号");return;}
    if(idCard.length!==18||!/^\d{17}[\dXx]$/.test(idCard)){alert("请输入有效的18位身份证号");return;}
    const btn=document.getElementById("riskQueryBtn");
    btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0;display:inline-block;vertical-align:middle"></div> 查询中...';
    btn.disabled=true;
    setTimeout(()=>{
      const levels=["低风险","中风险","高风险"];
      const level=levels[Math.floor(Math.random()*3)];
      const score=level==="低风险"?Math.floor(Math.random()*20)+80:level==="中风险"?Math.floor(Math.random()*20)+50:Math.floor(Math.random()*30)+10;
      const now=new Date();
      const timeStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0")+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
      riskResult={name:name,idCard:idCard.replace(/(\d{6})(\d{8})(\d{4})/,'$1********$3'),level:level,score:score,time:timeStr,queryCount:Math.floor(Math.random()*5)+1,lastQuery:timeStr};
      render();
    },1500);
  });
}

function ea(s){return(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

// ===== Init =====
document.addEventListener("DOMContentLoaded",()=>{
  document.querySelectorAll(".tab-bar button").forEach(b=>b.addEventListener("click",()=>{
    const target=b.dataset.page;
    if(target==="profile"&&!isAuthorized){
      document.getElementById("wxAuthModal").classList.add("show");
      return;
    }
    if(target==="profile"&&isAuthorized&&!isProfileSetup){
      page="profile";render();
      document.getElementById("profileSetupModal").classList.add("show");
      return;
    }
    page=target;render();
  }));
  document.getElementById("reModalClose").addEventListener("click",()=>document.getElementById("reModal").classList.remove("show"));
  document.getElementById("reModal").addEventListener("click",e=>{if(e.target.id==="reModal")e.target.classList.remove("show")});
  document.getElementById("imgModal").addEventListener("click",()=>document.getElementById("imgModal").classList.remove("show"));
  document.getElementById("agrClose").addEventListener("click",()=>document.getElementById("agrModal").classList.remove("show"));
  document.getElementById("agrModal").addEventListener("click",e=>{if(e.target.id==="agrModal")e.target.classList.remove("show")});

  // WeChat Auth
  document.getElementById("wxAuthBtn").addEventListener("click",()=>{
    const btn=document.getElementById("wxAuthBtn");
    btn.innerHTML='<div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0"></div> 授权中...';
    btn.disabled=true;
    setTimeout(()=>{
      isAuthorized=true;
      document.getElementById("wxAuthModal").classList.remove("show");
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348z"/></svg>微信一键授权';
      btn.disabled=false;
      page="profile";render();
      setTimeout(()=>document.getElementById("profileSetupModal").classList.add("show"),300);
    },1500);
  });
  document.getElementById("wxAuthCancel").addEventListener("click",()=>{
    document.getElementById("wxAuthModal").classList.remove("show");
  });

  // Profile Setup
  document.getElementById("setupSubmitBtn").addEventListener("click",()=>{
    const isAgent=document.querySelector('input[name="isAgent"]:checked');
    const company=document.getElementById("companySelect").value;
    const agentId=document.getElementById("agentIdInput").value.trim();
    if(!isAgent){alert("请选择是否为代理人");return;}
    if(!company){alert("请选择所属经纪公司");return;}
    if(!agentId){alert("请输入经纪人编号");return;}
    isProfileSetup=true;
    ME.company=company;ME.agentId=agentId;ME.isAgent=isAgent.value==="yes";
    document.getElementById("profileSetupModal").classList.remove("show");
    render();
  });

  render();
});
</script>
</body>
</html>
